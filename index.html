<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>林新凱 Kai Lin — AI Product Builder</title>
<meta name="description" content="林新凱 Kai Lin — AI Product Builder。跨領域橫跨設計、程式與行銷,想清楚再做、用數據驗證成果。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#08080a;
  --ink:#f5f5f6;
  --text:#c3c3c8;
  --muted:#8f8f97;
  --faint:#5a5a62;
  --glass:rgba(255,255,255,.045);
  --glass-2:rgba(255,255,255,.07);
  --line:rgba(255,255,255,.09);
  --line-soft:rgba(255,255,255,.05);
  --sans:"Geist","Noto Sans TC",system-ui,-apple-system,sans-serif;
  --mono:"Geist Mono",ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
  letter-spacing:-.01em;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:rgba(255,255,255,.85);color:#08080a}
svg{display:block}

/* ── low-poly fixed background ── */
#poly{position:fixed;inset:0;z-index:-2;background:var(--bg)}
#poly canvas{display:block;width:100%;height:100%}
#vign{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(120% 90% at 42% 42%,transparent 22%,rgba(8,8,10,.62) 72%,rgba(8,8,10,.94) 100%),
    linear-gradient(rgba(8,8,10,.2),rgba(8,8,10,.2))}

/* ── nav pill ── */
nav{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:4px;padding:7px 9px;border-radius:999px;
  background:rgba(20,20,24,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:94vw}
nav a{font-size:13.5px;font-weight:500;color:var(--text);padding:8px 15px;border-radius:999px;
  transition:.3s var(--ease);white-space:nowrap}
nav a:hover{color:var(--ink)}
nav a.active{color:var(--ink);background:var(--glass-2)}
@media(max-width:680px){nav{gap:0;padding:5px 6px}nav a{padding:7px 10px;font-size:12px}}
@media(max-width:430px){nav a[data-opt]{display:none}}

/* ── layout ── */
.wrap{max-width:1400px;margin:0 auto;padding:0 clamp(24px,4vw,60px)}
section{position:relative}
.h-sec{font-weight:800;letter-spacing:-.03em;font-size:clamp(30px,4.2vw,52px);line-height:1.05;
  margin-bottom:clamp(24px,3.5vh,40px)}

/* reveal */
.rv{opacity:0;transform:translateY(26px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.rv.in{opacity:1;transform:none}
.rv[data-d="1"]{transition-delay:.07s}.rv[data-d="2"]{transition-delay:.14s}
.rv[data-d="3"]{transition-delay:.21s}.rv[data-d="4"]{transition-delay:.28s}

/* ── hero ── */
#home{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:120px 24px 80px}
#home .hi{font-weight:900;letter-spacing:-.04em;line-height:.95;
  font-size:clamp(54px,11vw,124px)}
#home .sub{margin-top:22px;color:var(--text);font-size:clamp(16px,2.4vw,22px);font-weight:400;
  letter-spacing:.01em;min-height:1.4em}
.tw-caret{display:inline-block;margin-left:1px;color:var(--ink);font-weight:300;
  transform:translateY(1px);animation:blink 1.05s step-end infinite}
@keyframes blink{50%{opacity:0}}
#home .zh{margin-top:10px;color:var(--muted);font-family:var(--mono);font-size:13px;letter-spacing:.14em}
.scroll-cue{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--faint);
  display:flex;flex-direction:column;align-items:center;gap:9px}
.scroll-cue i{width:1px;height:38px;background:linear-gradient(var(--faint),transparent);
  animation:cue 2s var(--ease) infinite}
@keyframes cue{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}
  51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* ── about ── */
#about{padding:clamp(60px,11vh,130px) 0}
#about p{max-width:72ch;color:var(--text);font-weight:300;line-height:1.8;
  font-size:clamp(15px,1.4vw,17.5px)}
#about p b{color:var(--ink);font-weight:500}
.socials{display:flex;gap:14px;margin-top:30px}
.socials a{width:44px;height:44px;display:grid;place-items:center;border-radius:12px;
  background:var(--glass);border:1px solid var(--line);color:var(--text);
  backdrop-filter:blur(10px);transition:.3s var(--ease)}
.socials a:hover{color:var(--ink);background:var(--glass-2);transform:translateY(-3px)}
.socials svg{width:19px;height:19px}

/* ── experience accordion ── */
#experience{padding:clamp(60px,11vh,130px) 0}
.exp-card{background:var(--glass);border:1px solid var(--line);border-radius:16px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);margin-bottom:14px;
  overflow:hidden;transition:border-color .3s,background .3s}
.exp-card:hover{border-color:rgba(255,255,255,.16)}
.exp-head{width:100%;background:none;border:0;color:inherit;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:22px 24px;text-align:left;font-family:inherit}
.exp-role{font-weight:600;font-size:clamp(16px,2.2vw,19px);letter-spacing:-.01em}
.exp-org{color:var(--muted);font-size:13.5px;margin-top:4px;font-weight:300}
.exp-right{display:flex;align-items:center;gap:16px;flex:none}
.exp-period{font-family:var(--mono);font-size:12.5px;color:var(--text);letter-spacing:.03em;white-space:nowrap}
.chev{width:20px;height:20px;color:var(--muted);transition:transform .4s var(--ease)}
.exp-card.open .chev{transform:rotate(180deg)}
.exp-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .5s var(--ease)}
.exp-card.open .exp-body{grid-template-rows:1fr}
.exp-bw{overflow:hidden}
.exp-inner{padding:0 24px 24px;border-top:1px solid var(--line-soft)}
.exp-inner .blk{margin-top:18px}
.exp-inner .blk h4{font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:8px}
.exp-inner .blk li{list-style:none;position:relative;padding-left:16px;color:var(--text);
  font-weight:300;font-size:14.5px;line-height:1.7;margin-bottom:4px}
.exp-inner .blk li::before{content:"·";position:absolute;left:3px;color:var(--muted);font-weight:700}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.tag{font-family:var(--mono);font-size:12px;color:var(--text);letter-spacing:.02em;
  border:1px solid var(--line);border-radius:999px;padding:5px 11px;background:rgba(255,255,255,.02)}

/* ── projects ── */
#projects{padding:clamp(60px,11vh,130px) 0}
.filters{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:34px}
.filters button{font-family:inherit;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;
  background:var(--glass);border:1px solid var(--line);border-radius:999px;padding:8px 17px;
  backdrop-filter:blur(8px);transition:.25s var(--ease)}
.filters button:hover{color:var(--ink)}
.filters button.on{background:#f2f2f4;color:#08080a;border-color:#f2f2f4}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:24px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;flex-direction:column;
  transition:.35s var(--ease)}
.card:hover{background:var(--glass-2);border-color:rgba(255,255,255,.18);transform:translateY(-4px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card h3{font-weight:600;font-size:19px;letter-spacing:-.02em;line-height:1.25}
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  background:#f2f2f4;color:#08080a;border-radius:999px;padding:4px 9px;white-space:nowrap;font-weight:500}
.badge.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.card p{color:var(--text);font-weight:300;font-size:15px;line-height:1.7;margin-top:14px;flex:1}
.card-links{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.plink{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--ink);
  background:var(--glass-2);border:1px solid var(--line);border-radius:10px;padding:8px 13px;
  transition:.25s var(--ease)}
.plink:hover{background:#f2f2f4;color:#08080a;border-color:#f2f2f4}
.plink svg{width:13px;height:13px}
.card .tags{margin-top:16px}

/* ── stack ── */
#stack{padding:clamp(60px,11vh,130px) 0}
.stack-row{display:grid;grid-template-columns:130px 1fr;gap:24px;align-items:start;
  padding:22px 0;border-top:1px solid var(--line-soft)}
.stack-row:last-child{border-bottom:1px solid var(--line-soft)}
.stack-row .sg{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--muted);padding-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{font-size:13.5px;font-weight:400;color:var(--ink);background:var(--glass);border:1px solid var(--line);
  border-radius:10px;padding:8px 14px;backdrop-filter:blur(8px);transition:.25s var(--ease)}
.chip:hover{background:var(--glass-2);border-color:rgba(255,255,255,.2)}
@media(max-width:560px){.stack-row{grid-template-columns:1fr;gap:12px}}
#education{padding:clamp(60px,11vh,130px) 0}
.edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,5vw,70px)}
.edu-label{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}
.edu-item{padding:14px 0;border-bottom:1px solid var(--line-soft)}
.edu-item:first-of-type{border-top:1px solid var(--line-soft)}
.edu-when{display:block;font-family:var(--mono);font-size:11.5px;color:var(--muted);
  letter-spacing:.06em;margin-bottom:5px}
.edu-what{font-size:clamp(14.5px,1.1vw,16px);font-weight:300;color:var(--text);line-height:1.5}
.edu-what b{color:var(--ink);font-weight:500}
@media(max-width:640px){.edu-grid{grid-template-columns:1fr;gap:40px}}

/* ── contact ── */
#contact{padding:clamp(60px,12vh,140px) 0 0}
#contact .h-sec{margin-bottom:18px}
.mail{display:inline-flex;align-items:center;gap:14px;font-weight:500;letter-spacing:-.02em;
  font-size:clamp(22px,4.5vw,46px);transition:.3s var(--ease)}
.mail:hover{gap:22px;color:var(--text)}
.mail svg{width:.7em;height:.7em}
.cinfo{display:flex;flex-wrap:wrap;gap:14px 40px;margin-top:34px}
.cinfo a,.cinfo span{font-family:var(--mono);font-size:13px;color:var(--text);letter-spacing:.03em;
  display:inline-flex;gap:8px;align-items:center;transition:color .25s}
.cinfo a:hover{color:var(--ink)}
footer{margin-top:clamp(50px,8vh,90px);border-top:1px solid var(--line-soft);
  padding:24px 0 46px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.06em}
/* clickable card hint */
.card{cursor:pointer}
.card-more{margin-top:16px;font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;
  color:var(--muted);display:inline-flex;align-items:center;gap:6px;transition:.25s var(--ease)}
.card:hover .card-more{color:var(--ink)}
.card-more .ar{transition:transform .25s var(--ease)}
.card:hover .card-more .ar{transform:translateX(4px)}
.exp-more{margin-top:18px;font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;cursor:pointer;
  color:var(--text);background:var(--glass-2);border:1px solid var(--line);border-radius:999px;
  padding:8px 15px;transition:.25s var(--ease)}
.exp-more:hover{background:#f2f2f4;color:#08080a;border-color:#f2f2f4}

/* detail modal */
.modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(4,4,6,.72);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fadein .3s var(--ease)}
.modal-panel{position:relative;z-index:1;width:min(960px,96vw);max-height:92vh;overflow:auto;
  background:rgba(18,18,22,.82);border:1px solid var(--line);border-radius:20px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:0 30px 90px rgba(0,0,0,.6);padding:clamp(26px,4vw,44px);
  animation:pop .4s var(--ease)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;
  background:var(--glass);border:1px solid var(--line);color:var(--text);cursor:pointer;font-size:15px;
  display:grid;place-items:center;transition:.25s var(--ease);z-index:2}
.modal-close:hover{background:var(--glass-2);color:var(--ink)}
.modal-meta{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px}
.modal-panel h3{font-weight:700;font-size:clamp(24px,4.5vw,36px);letter-spacing:-.02em;line-height:1.08}
.modal-body{color:var(--text);font-weight:300;line-height:1.85;font-size:15.5px;margin-top:18px}
.modal-body p{margin-bottom:12px}.modal-body p:last-child{margin-bottom:0}
.modal-body b{color:var(--ink);font-weight:500}
.modal-cover{width:100%;border-radius:14px;border:1px solid var(--line);display:block;margin:20px 0 4px}
.modal-imgs{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-top:22px}
.modal-imgs img{width:100%;border-radius:12px;border:1px solid var(--line);display:block}
@media(max-width:560px){.modal-imgs{grid-template-columns:1fr}}
.modal-panel .tags{margin-top:22px}
.modal-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}

/* ── 手機/平板左右留白(下列區塊原本水平 padding 被各自 #id 規則歸零,小螢幕會貼齊邊緣;放在最後確保覆蓋) ── */
@media(max-width:1100px){
  #about,#experience,#projects,#stack,#education,#contact{
    padding-left:clamp(20px,5vw,40px);padding-right:clamp(20px,5vw,40px)}
}
</style>
</head>
<body>

<div id="poly"></div>
<div id="vign"></div>

<nav id="nav"></nav>

<!-- ═══════════════ 內容由下方 JS 的 DATA 物件產生 ═══════════════ -->
<main>
  <section id="home">
    <h1 class="hi rv" id="hi"></h1>
    <p class="sub rv" data-d="1" id="sub"></p>
    <p class="zh rv" data-d="2" id="zh"></p>
    <div class="scroll-cue">SCROLL<i></i></div>
  </section>

  <section id="about" class="wrap">
    <h2 class="h-sec rv">About Me</h2>
    <p class="rv" data-d="1" id="aboutText"></p>
    <div class="socials rv" data-d="2" id="socials"></div>
  </section>

  <section id="experience" class="wrap">
    <h2 class="h-sec rv">Experience</h2>
    <div id="expList"></div>
  </section>

  <section id="projects" class="wrap">
    <h2 class="h-sec rv">Personal Projects</h2>
    <div class="filters rv" data-d="1" id="filters"></div>
    <div class="grid" id="projGrid"></div>
  </section>

  <section id="stack" class="wrap">
    <h2 class="h-sec rv">My Stack</h2>
    <div id="stackList"></div>
  </section>

  <section id="education" class="wrap">
    <h2 class="h-sec rv">Education &amp; Awards</h2>
    <div class="edu-grid">
      <div class="edu-col rv">
        <div class="edu-label">學歷 / Education</div>
        <div id="eduList"></div>
      </div>
      <div class="edu-col rv" data-d="1">
        <div class="edu-label">獎項 / Awards</div>
        <div id="awardList"></div>
      </div>
    </div>
  </section>

  <section id="contact" class="wrap">
    <h2 class="h-sec rv">Let's connect</h2>
    <a class="mail rv" data-d="1" id="mail"></a>
    <div class="cinfo rv" data-d="2" id="cinfo"></div>
    <footer id="foot"></footer>
  </section>
</main>

<!-- 點卡片後跳出的詳細內容彈窗 -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-bg" data-close></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" data-close aria-label="關閉">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- 互動背景函式庫:Vanta.NET(依賴 three.js)。如需離線/不依賴 CDN,可下載這兩個檔放本機並改成相對路徑 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.net.min.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════════════
   ▼▼▼  你要改的東西全部在這個 DATA 物件裡。改文字就好,不用碰上面的程式。 ▼▼▼
   多版本機制:SHARED 是各版本共用(改一次全部生效);PROFILES 裡每個版本放各自文字。
   預設顯示 DEFAULT_PROFILE;也可用網址 ?v=marketing 切換,方便對不同職缺寄不同連結。
   要新增版本:複製整個 builder:{ … } 區塊,改名與內容即可。
   ════════════════════════════════════════════════════════════════════════ */
const SHARED = {
  /* ── 各版本共用:改一次,所有版本生效 ── */
  nav: [
    {label:"Home",       href:"#home"},
    {label:"About",      href:"#about"},
    {label:"Experience", href:"#experience"},
    {label:"Projects",   href:"#projects"},
    {label:"Stack",      href:"#stack", opt:true},
    {label:"Contact",    href:"#contact"},
  ],
  links: {
    linkedin: "#",                                   // ← TODO 換成你的 LinkedIn
    behance:  "#",                                   // ← TODO 換成你的 Behance
    resume:   "mailto:k28552219@gmail.com",          // 或放履歷 PDF 連結
  },
  /* ── 學歷(when=年份,what=內容;<b> 會變白) ── */
  education:[
    {when:"2023 – 2025", what:"<b>雲林科技大學</b> · 數位媒體設計研究所 碩士"},
    {when:"2019 – 2023", what:"<b>國立聯合大學</b> · 文化創意與數位行銷學系 學士"},
  ],
  /* ── 獎項 ── */
  awards:[
    {when:"大學期間", what:"苗栗縣政府 風箏節微電影(產學合作)"},
    {when:"大學期間", what:"空拍微電影大賽 優選"},
    {when:"碩士期間", what:"U-Start 創業競賽 通過第一輪"},
  ],
  contact:{
    email:"k28552219@gmail.com",
    phone:"0925-230-110",
    location:"桃園市中壢區",
  },
};

const PROFILES = {

  /* ═══════════ 版本 1:builder(AI Product Builder / CMoney)═══════════ */
  builder: {
    hero: {
      hi:  "Hi, I'm Kai",
      sub: "AI Product Builder · Product / Marketing / BD",
      /* roles = Hero 打字機輪播的句子(會逐字打出再收回、反覆循環)。要改字就改這裡。 */
      roles: ["AI Product Builder.","Product · Marketing · BD.","Designer who codes.","Ships fast with AI."],
      zh:  "林新凱 — 目標導向,用數據驗證成果",

/* hero typewriter — types each role, pauses, deletes, loops */
(function(){
  const el=document.getElementById("sub"), roles=DATA.hero.roles;
  if(!roles || !roles.length){ el.textContent = DATA.hero.sub || ""; return; }
  el.innerHTML='<span id="tw"></span><span class="tw-caret">█</span>';
  const tw=document.getElementById("tw");
  let ri=0, ci=0, del=false;
  (function tick(){
    const w=roles[ri];
    ci += del ? -1 : 1;
    tw.textContent = w.slice(0,ci);
    if(!del && ci===w.length){ del=true; return setTimeout(tick,1600); }
    if(del && ci===0){ del=false; ri=(ri+1)%roles.length; return setTimeout(tick,420); }
    setTimeout(tick, del?42:80);
  })();
})();

const modal=document.getElementById("modal"), modalContent=document.getElementById("modalContent");
function openModal(html){ modalContent.innerHTML=html; modal.classList.add("open");
  modal.setAttribute("aria-hidden","false"); document.body.style.overflow="hidden";
  const pn=modal.querySelector(".modal-panel"); if(pn) pn.scrollTop=0; }
function closeModal(){ modal.classList.remove("open"); modal.setAttribute("aria-hidden","true"); document.body.style.overflow=""; }
modal.querySelectorAll("[data-close]").forEach(el=>el.addEventListener("click",closeModal));
addEventListener("keydown",e=>{ if(e.key==="Escape" && modal.classList.contains("open")) closeModal(); });
function imgGrid(a){ return (a&&a.length)?`<div class="modal-imgs">${a.map(s=>`<img src="${s}" alt="" loading="lazy">`).join("")}</div>`:""; }
function tagRow(a){ return (a&&a.length)?`<div class="tags">${a.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:""; }
function cover(d){ return (d&&d.cover)?`<img class="modal-cover" src="${d.cover}" alt="" loading="lazy">`:""; }
function openExp(e){
  const d=e.detail||{};
  const text = d.text || e.blocks.map(b=>`<p><b>${b.h}</b><br>${b.items.join("<br>")}</p>`).join("");
  openModal(`<div class="modal-meta">${e.org}${e.loc?' ｜ '+e.loc:''} · ${e.period}</div>
    <h3>${e.role}</h3>
    ${cover(d)}
    <div class="modal-body">${text}</div>
    ${imgGrid(d.images)}
    ${tagRow(e.tech)}`);
}
function openProj(p){
  const d=p.detail||{};
  const links=(p.links||[]).map(l=>{const ext=isExt(l.url);
    return `<a class="plink" href="${l.url}" ${ext?'target="_blank" rel="noopener"':''}>${l.label}${ext?ICON.ext:''}</a>`;}).join("");
  openModal(`${p.badge?`<div class="modal-meta">${p.badge}</div>`:""}
    <h3>${p.title}</h3>
    ${cover(d)}
    <div class="modal-body"><p>${p.desc}</p>${d.text||""}</div>
    ${imgGrid(d.images)}
    ${tagRow(p.tech)}
    ${links?`<div class="modal-links">${links}</div>`:""}`);
}

(function(){
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce || typeof VANTA==="undefined" || !window.THREE) return;  // 尊重減少動態偏好;缺套件則保持純底色
  let fx = VANTA.NET({
    el:"#poly", THREE:window.THREE,
    mouseControls:true, touchControls:true, gyroControls:false,
    minHeight:200, minWidth:200, scale:1, scaleMobile:1,
    color:0x9a9aa3,            // 點/線顏色(對應 --muted,亮一點較明顯)
    backgroundColor:0x08080a,  // 對應 --bg
    points:11, maxDistance:22, spacing:17, showDots:true
  });
  // 行動裝置降載:減少點數以省效能
  if(innerWidth<700 && fx && fx.setOptions){ fx.setOptions({points:8, maxDistance:20, spacing:20}); }
})();
